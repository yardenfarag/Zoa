version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: zoa-db
    restart: unless-stopped
    ports:
      - "5556:5432"
    environment:
      POSTGRES_USER: zoa
      POSTGRES_PASSWORD: zoa
      POSTGRES_DB: zoa_db
    volumes:
      - zoa_pgdata:/var/lib/postgresql/data

volumes:
  zoa_pgdata:
